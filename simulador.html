// ----------------------------------------------------------------------------
// SHA-256 real sobre el payload del veredicto (cadena de custodia).
// ----------------------------------------------------------------------------
async function sealHash(payload) {
  try {
    if (window.crypto && window.crypto.subtle) {
      const data = new TextEncoder().encode(payload);
      const buf = await window.crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
    }
  } catch (e) {
    /* cae al pseudo-sello determinista de abajo */
  }
  // Fallback determinista (FNV-1a expandido) si no hay subtle crypto.
  let h = 0x811c9dc5;
  for (let i = 0; i < payload.length; i++) {
    h ^= payload.charCodeAt(i);
    h = Math.imul(h, 0x01000193) >>> 0;
  }
  let out = "";
  for (let i = 0; i < 8; i++) {
    h = Math.imul(h ^ h >>> 13, 0x01000193) >>> 0;
    out += h.toString(16).padStart(8, "0");
  }
  return out.slice(0, 64);
}
