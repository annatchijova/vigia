<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BASH.REF — Referencia de Comandos Linux</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg:     #0a0c0e;
    --bg2:    #0f1214;
    --bg3:    #141820;
    --border: #1e2530;
    --green:  #00ff88;
    --cyan:   #00e5ff;
    --amber:  #ffb300;
    --red:    #ff3d5a;
    --purple: #b388ff;
    --teal:   #00bcd4;
    --text:   #c8d8e8;
    --muted:  #4a5568;
    --dim:    #2a3040;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events: none;
    z-index: 999;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 28px 14px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 14px;
    position: sticky; top: 0;
    background: rgba(10,12,14,0.97);
    backdrop-filter: blur(8px);
    z-index: 100;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 21px;
    color: var(--green);
    text-shadow: 0 0 20px rgba(0,255,136,0.4);
    flex-shrink: 0;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--muted); }
  .tagline { color: var(--muted); font-size: 11px; flex-shrink: 0; }

  .search-wrap { margin-left: auto; position: relative; flex-shrink: 0; }
  .search-wrap::before {
    content: '⌕'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 15px; pointer-events: none;
  }
  #search {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px;
    padding: 7px 12px 7px 30px; border-radius: 4px; width: 270px;
    outline: none; transition: border-color .2s, box-shadow .2s;
  }
  #search:focus { border-color: var(--green); box-shadow: 0 0 0 2px rgba(0,255,136,0.1); }
  #search::placeholder { color: var(--muted); }

  .stats { font-size: 10px; color: var(--muted); margin-left: 6px; white-space: nowrap; }
  .stats b { color: var(--cyan); }

  /* ── LAYOUT ── */
  .layout { display: flex; min-height: calc(100vh - 58px); }

  nav {
    width: 210px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 14px 0;
    position: sticky; top: 58px;
    height: calc(100vh - 58px);
    overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: var(--dim) transparent;
  }
  nav::-webkit-scrollbar { width: 4px; }
  nav::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  .nav-label {
    font-size: 9px; letter-spacing: 2px; color: var(--muted);
    padding: 0 16px 6px; text-transform: uppercase;
  }
  .nav-btn {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 7px 16px;
    background: none; border: none; color: var(--muted);
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    text-align: left; cursor: pointer;
    transition: color .15s, background .15s;
    border-left: 2px solid transparent;
  }
  .nav-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .nav-btn.active { color: var(--green); background: rgba(0,255,136,0.06); border-left-color: var(--green); }
  .nav-btn .icon { font-size: 13px; width: 16px; text-align: center; }
  .nav-count {
    margin-left: auto; background: var(--dim); color: var(--muted);
    font-size: 9px; padding: 1px 5px; border-radius: 8px;
  }
  .nav-btn.active .nav-count { background: rgba(0,255,136,0.15); color: var(--green); }

  main { flex: 1; padding: 24px 28px; overflow-y: auto; max-width: calc(100vw - 210px); }

  /* ── SECTION HEADERS ── */
  .section-header {
    display: flex; align-items: baseline; gap: 12px;
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .section-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; color: var(--text); }
  .section-subtitle { font-size: 11px; color: var(--muted); }

  /* ── COMMAND GRID ── */
  .cmd-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 8px; margin-bottom: 36px;
  }

  .cmd-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 14px;
    transition: border-color .15s, transform .1s, box-shadow .15s;
    cursor: default; position: relative; overflow: hidden;
  }
  .cmd-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--green); opacity: 0; transition: opacity .15s;
  }
  .cmd-card:hover { border-color: rgba(0,255,136,0.25); box-shadow: 0 2px 16px rgba(0,255,136,0.05); transform: translateY(-1px); }
  .cmd-card:hover::before { opacity: 1; }

  .cmd-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .cmd-name { font-weight: 700; font-size: 13px; color: var(--green); font-family: 'JetBrains Mono', monospace; }

  .cmd-badge {
    font-size: 9px; padding: 1px 6px; border-radius: 3px;
    letter-spacing: 0.5px; text-transform: uppercase; font-weight: 500;
  }
  .badge-danger { background: rgba(255,61,90,0.15);  color: var(--red);    border: 1px solid rgba(255,61,90,0.2); }
  .badge-net    { background: rgba(0,229,255,0.1);   color: var(--cyan);   border: 1px solid rgba(0,229,255,0.15); }
  .badge-sec    { background: rgba(255,179,0,0.1);   color: var(--amber);  border: 1px solid rgba(255,179,0,0.15); }
  .badge-priv   { background: rgba(179,136,255,0.1); color: var(--purple); border: 1px solid rgba(179,136,255,0.2); }

  .cmd-syntax { font-size: 11px; color: var(--cyan); opacity: 0.75; margin-bottom: 5px; word-break: break-all; }
  .cmd-syntax b { color: var(--amber); opacity: 1; }
  .cmd-desc { font-size: 11.5px; color: #8a9ab0; line-height: 1.5; }
  .cmd-card:hover .cmd-desc { color: var(--text); }

  /* ── INTERPRETACIÓN (tarjetas especiales de actividad) ── */
  .cmd-card.has-interp .cmd-interp {
    display: none;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: #7ba0b8;
    line-height: 1.55;
  }
  .cmd-card.has-interp:hover .cmd-interp { display: block; }
  .cmd-interp .interp-title { color: var(--teal); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
  .cmd-interp code {
    display: block; background: rgba(0,0,0,0.3); border-left: 2px solid var(--teal);
    padding: 4px 8px; margin: 4px 0; font-size: 10px; color: #aad0e8;
    border-radius: 0 3px 3px 0; word-break: break-all;
  }
  .cmd-interp .field { color: var(--amber); font-weight: 500; }

  /* ── COPY BTN ── */
  .copy-btn {
    position: absolute; right: 8px; top: 8px;
    background: none; border: none; color: var(--muted); font-size: 11px;
    cursor: pointer; opacity: 0; padding: 3px 6px; border-radius: 3px;
    transition: opacity .15s, color .15s, background .15s;
    font-family: 'JetBrains Mono', monospace;
  }
  .cmd-card:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { color: var(--green); background: rgba(0,255,136,0.08); }
  .copy-btn.copied { color: var(--green); }

  .cat-section { display: none; }
  .cat-section.visible { display: block; }

  .no-results { display: none; text-align: center; padding: 80px 20px; color: var(--muted); }
  .no-results.visible { display: block; }
  .no-results .nr-icon { font-size: 40px; margin-bottom: 12px; }
  .no-results .nr-text { font-size: 13px; }
  .no-results .nr-sub  { font-size: 11px; margin-top: 6px; color: var(--dim); }

  #search-results { display: none; }
  #search-results.visible { display: block; }

  .interp-hint {
    font-size: 9px; color: var(--teal); margin-top: 4px; opacity: 0.7;
    font-style: italic;
  }
</style>
</head>
<body>

<header>
  <div class="logo">BASH<span>.</span>REF</div>
  <div class="tagline">// Referencia rápida de comandos Linux</div>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Buscar comando o descripción..." autocomplete="off" spellcheck="false">
  </div>
  <div class="stats">Mostrando <b id="visible-count">0</b> de <b id="total-count">0</b> comandos</div>
</header>

<div class="layout">
  <nav id="sidebar"></nav>
  <main id="main-content">
    <div id="search-results"></div>
  </main>
</div>

<script>
// Comandos con campo opcional `interp` para mostrar lógica de lectura del output
const CATEGORIES = [

  // ── 1. ACTIVIDAD E HISTORIAL ─────────────────────────────────────────
  {
    id: 'activity',
    icon: '🕵️',
    name: 'Actividad e historial',
    color: '#00bcd4',
    commands: [
      {
        name: 'who',
        syntax: 'who <b>-a</b>',
        desc: 'Muestra quién está conectado al sistema ahora mismo: usuario, terminal, hora de login y display.',
        interp: `<div class="interp-title">Cómo leer el output</div>
<code>vegandel  tty7  2026-05-16 09:06  (:0)</code>
<span class="field">vegandel</span> → usuario conectado<br>
<span class="field">tty7</span> → terminal virtual 7 = sesión gráfica de escritorio<br>
<span class="field">09:06</span> → hora de inicio de sesión<br>
<span class="field">(:0)</span> → display X11 nº0 = sesión local, no remota via SSH<br><br>
Si ves <span class="field">pts/0, pts/1…</span> son terminales remotas (SSH). Si ves una IP en lugar de (:0), alguien entró de fuera.`
      },
      {
        name: 'whoami',
        syntax: 'whoami',
        desc: 'Muestra con qué identidad efectiva estás operando ahora mismo. Fundamental al usar su o sudo.',
        interp: `<div class="interp-title">Cuándo importa</div>
Tras <code>sudo su -</code> o <code>su - otrouser</code> whoami confirma si realmente cambiaste de identidad. Si devuelve <span class="field">root</span> cuando no lo esperabas, cuidado.`
      },
      {
        name: 'w',
        syntax: 'w',
        desc: 'Versión extendida de who: muestra usuarios activos, qué proceso tienen en primer plano, idle time, y carga del sistema.',
        interp: `<div class="interp-title">Cómo leer el output</div>
<code> 09:29 up 1 day, 1 user, load average: 1.11, 1.44, 1.48</code>
<code>USER   TTY  FROM   LOGIN@  IDLE  JCPU  PCPU  WHAT</code>
<code>vegandel  -   -    Sat09  20:18  0.00s  0.09s  lightdm</code>
<span class="field">up 1 day</span> → tiempo encendido desde último boot<br>
<span class="field">load: 1.11, 1.44, 1.48</span> → carga media en 1/5/15 minutos. Normal si es menor que el nº de núcleos (<code>nproc</code>)<br>
<span class="field">IDLE 20:18</span> → minutos sin teclear. No significa que no haya procesos corriendo<br>
<span class="field">WHAT</span> → último proceso en primer plano (lightdm = escritorio gráfico)`
      },
      {
        name: 'last',
        syntax: 'last <b>-n 20</b>',
        desc: 'Historial de logins del sistema leído desde /var/log/wtmp. Muestra usuario, terminal, IP origen, fechas y duración.',
        interp: `<div class="interp-title">Cómo leer el output</div>
<code>vegandel  tty7  :0  Sat May 16 09:06   still running</code>
<code>reboot    system boot   Sat May 16 09:02   still running</code>
<code>vegandel  tty7  :0  Mon May 11 08:07 - crash  (5+00:55)</code>
<span class="field">still running</span> → sesión activa ahora mismo<br>
<span class="field">crash (5+00:55)</span> → sesión terminó por corte/cuelgue, duró 5 días 55 minutos. No fue shutdown limpio<br>
<span class="field">reboot</span> → entradas del kernel, no del usuario<br>
<span class="field">wtmp begins…</span> → hasta dónde llega el registro (se rota)<br><br>
<b>Señales de alerta:</b> usuario desconocido, IP extraña en el campo FROM, horarios inusuales.`
      },
      {
        name: 'lastb',
        syntax: 'sudo lastb <b>-n 20</b>',
        desc: 'Intentos de login FALLIDOS desde /var/log/btmp. Requiere sudo. Cero output = nadie falló al entrar.',
        badge: 'sec',
        interp: `<div class="interp-title">Cómo leer el output</div>
<code>admin  ssh:notty  45.33.32.156  Sun May 17 03:12 - 03:12</code>
<span class="field">admin</span> → usuario intentado (no existe en tu sistema)<br>
<span class="field">ssh:notty</span> → intento remoto via SSH, no terminal física<br>
<span class="field">45.33.32.156</span> → IP atacante (esta es de Shodan/nmap.org, por ejemplo)<br><br>
Muchos intentos de "root", "admin", "ubuntu" = escaneo automático de bots. Normal en IPs públicas. Para contrarrestar: fail2ban, cambiar puerto SSH, desactivar login root.`
      },
      {
        name: 'last (reboot)',
        syntax: 'last <b>reboot</b>',
        desc: 'Muestra solo el historial de arranques del sistema. Útil para ver cuándo hubo reinicios inesperados.',
        interp: `<div class="interp-title">Patrón típico</div>
<code>reboot  system boot  6.8.0-90-generic  Sat May 16 09:02</code>
El campo de kernel (<span class="field">6.8.0-90-generic</span>) te dice qué versión corrió en cada arranque. Si ves un kernel distinto al esperado en un boot reciente, investiga.`
      },
      {
        name: 'lastlog',
        syntax: 'lastlog',
        desc: 'Muestra el último login de CADA usuario del sistema. Detecta cuentas inactivas o sospechosamente activas.',
        badge: 'sec',
        interp: `<div class="interp-title">Cómo leer el output</div>
<code>root     pts/0  192.168.1.5  Sun May 17 02:00</code>
<code>daemon   **Never logged in**</code>
Si root aparece con login reciente y no fuiste tú: alarma. Las cuentas de sistema (daemon, www-data, nobody) deben mostrar "Never logged in".`
      },
      {
        name: 'history',
        syntax: 'history <b>| grep -i "sudo\|ssh\|wget\|curl"</b>',
        desc: 'Historial de comandos del shell actual (~/.bash_history). Filtrar por palabras clave revela actividad relevante.',
        interp: `<div class="interp-title">Trucos de uso</div>
<code>history | grep sudo</code> → todos los comandos con privilegios<br>
<code>!n</code> → re-ejecuta el comando número n<br>
<code>!!</code> → repite el último comando<br>
<code>Ctrl+R</code> → búsqueda reversa interactiva mientras escribís<br><br>
<b>Forense:</b> <code>cat ~/.bash_history</code> muestra el archivo sin numeración. Si el historial está vacío o tiene lagunas de tiempo inusuales, puede indicar que fue borrado intencionalmente.`
      },
      {
        name: 'history (timestamps)',
        syntax: 'HISTTIMEFORMAT="%F %T " history',
        desc: 'Activa timestamps en el historial. Muestra exactamente cuándo se ejecutó cada comando. Añadir al .bashrc para que sea permanente.',
        interp: `<div class="interp-title">Para que sea permanente</div>
<code>echo 'HISTTIMEFORMAT="%F %T "' >> ~/.bashrc</code>
<code>echo 'HISTSIZE=10000' >> ~/.bashrc</code>
<code>echo 'HISTFILESIZE=20000' >> ~/.bashrc</code>
Así cada entrada del historial llevará fecha y hora, incluso tras cerrar la sesión.`
      },
      {
        name: 'ps aux (snapshot)',
        syntax: 'ps <b>aux --sort=-%cpu</b> | head -20',
        desc: 'Snapshot de procesos activos ordenados por uso de CPU. Ver quién está consumiendo recursos en este momento.',
        interp: `<div class="interp-title">Cómo leer cada columna</div>
<code>USER   PID  %CPU  %MEM  VSZ    RSS   TTY  STAT  START  TIME  COMMAND</code>
<span class="field">PID</span> → identificador de proceso (para kill, lsof -p, etc.)<br>
<span class="field">%CPU</span> → uso en este momento. 200% = usando 2 núcleos completos<br>
<span class="field">%MEM</span> → porcentaje de RAM física usada<br>
<span class="field">VSZ</span> → memoria virtual total (incluye swap y libs compartidas, número inflado)<br>
<span class="field">RSS</span> → RAM física real ocupada. Este es el número que importa<br>
<span class="field">STAT</span> → S=durmiendo, R=corriendo, Z=zombie, D=I/O bloqueado, T=suspendido<br>
<span class="field">TIME</span> → CPU total acumulado desde que inició (no confundir con uptime)`
      },
      {
        name: 'lsof (usuario)',
        syntax: 'lsof <b>-u usuario</b>',
        desc: 'Lista todos los archivos abiertos por un usuario: conexiones de red, archivos en disco, pipes. Fotografía completa de actividad.',
        badge: 'sec',
        interp: `<div class="interp-title">Combinaciones útiles</div>
<code>lsof -i</code> → solo conexiones de red abiertas<br>
<code>lsof -i :4444</code> → qué proceso escucha en el puerto 4444<br>
<code>lsof -p PID</code> → todos los recursos abiertos por un proceso específico<br>
<code>lsof +D /tmp</code> → qué procesos tienen archivos abiertos en /tmp (sospechoso si hay ejecutables)`
      },
      {
        name: 'journalctl (sesión)',
        syntax: 'journalctl <b>-b</b> --since <b>"1 hour ago"</b>',
        desc: 'Logs del sistema del boot actual o de un intervalo de tiempo. Muestra todo lo que pasó en el sistema.',
        interp: `<div class="interp-title">Filtros útiles</div>
<code>journalctl -b</code> → desde el último arranque<br>
<code>journalctl -b -1</code> → boot anterior<br>
<code>journalctl --list-boots</code> → lista todos los boots con ID<br>
<code>journalctl --since "2026-05-16 09:00"</code> → desde fecha exacta<br>
<code>journalctl -p err..emerg</code> → solo errores y críticos<br>
<code>journalctl _UID=1000</code> → solo entradas de tu usuario`
      },
      {
        name: 'ss -tulnp',
        syntax: 'ss <b>-tulnp</b>',
        desc: 'Puertos y servicios escuchando ahora mismo. Muestra qué proceso está detrás de cada puerto abierto.',
        badge: 'sec',
        interp: `<div class="interp-title">Cómo leer el output</div>
<code>tcp  LISTEN  0  128  0.0.0.0:22  *:*  users:(("sshd",pid=1234))</code>
<span class="field">0.0.0.0:22</span> → escucha en TODAS las interfaces en puerto 22 (SSH expuesto a la red)<br>
<span class="field">127.0.0.1:11434</span> → solo loopback = accesible únicamente desde la misma máquina (seguro)<br>
<span class="field">*:*</span> → acepta conexiones de cualquier IP<br><br>
<b>Regla general:</b> solo deben escuchar en 0.0.0.0 o :: los servicios que realmente deben ser accesibles desde fuera. El resto, en 127.0.0.1.`
      },
      {
        name: 'nproc',
        syntax: 'nproc',
        desc: 'Número de núcleos de CPU disponibles. Indispensable para interpretar el load average del sistema.',
        interp: `<div class="interp-title">Cómo usarlo para interpretar load</div>
<code>nproc</code> devuelve, por ejemplo, <span class="field">4</span><br><br>
Load average <span class="field">1.5</span> con 4 núcleos = 37% de capacidad → tranquilo<br>
Load average <span class="field">4.0</span> con 4 núcleos = saturación total → investigar<br>
Load average <span class="field">8.0</span> con 4 núcleos = cola de espera → problema serio<br><br>
Ver load: <code>uptime</code> o <code>w</code> o la primera línea de <code>top</code>`
      },
      {
        name: 'uptime',
        syntax: 'uptime',
        desc: 'Tiempo encendido, usuarios activos y load average (1, 5 y 15 minutos). Resumen instantáneo del estado del sistema.',
        interp: `<div class="interp-title">Cómo leer el output</div>
<code>09:29:36 up 1 day, 27 min, 1 user, load average: 1.11, 1.44, 1.48</code>
<span class="field">up 1 day, 27 min</span> → tiempo desde último boot<br>
<span class="field">1 user</span> → sesiones activas<br>
<span class="field">1.11, 1.44, 1.48</span> → load en últimos 1, 5 y 15 minutos<br><br>
Si el número de 1 min es mucho mayor que el de 15 min → pico reciente<br>
Si el de 15 min es siempre alto → carga sostenida`
      },
      {
        name: 'ausearch',
        syntax: 'sudo ausearch <b>-ts today -m USER_LOGIN</b>',
        desc: 'Busca en logs de auditd. -ts desde tiempo, -m tipo de evento (USER_LOGIN, USER_CMD, ADD_USER, etc.).',
        badge: 'sec',
        interp: `<div class="interp-title">Eventos útiles para rastrear</div>
<code>ausearch -m USER_LOGIN -ts today</code> → logins de hoy<br>
<code>ausearch -m USER_CMD -ts yesterday</code> → comandos con sudo de ayer<br>
<code>ausearch -f /etc/passwd -ts week</code> → quién tocó /etc/passwd esta semana<br>
<code>ausearch -m EXECVE -ui 0 -ts today</code> → ejecuciones como root hoy`
      },
      {
        name: 'find (recientes)',
        syntax: 'find <b>/home /tmp /var/tmp</b> -mmin <b>-60</b> -type f',
        desc: 'Archivos modificados en los últimos N minutos. Muy útil para ver qué cambió recientemente en el sistema.',
        badge: 'sec',
        interp: `<div class="interp-title">Variaciones útiles</div>
<code>find / -mtime -1 -type f 2>/dev/null</code> → modificados en últimas 24h en todo el sistema<br>

      { name: 'pidstat (memory)', syntax: 'pidstat <b>-r -p ALL 1</b>', desc: 'Memory por proceso.' },
      { name: 'pidstat (io)', syntax: 'pidstat <b>-d -p ALL 1</b>', desc: 'I/O por proceso.' },
      { name: 'mpstat (cpu)', syntax: 'mpstat <b>-P ALL 1</b>', desc: 'Por CPU individual' },
      { name: 'iostat (extended)', syntax: 'iostat <b>-x -d sda 1</b>', desc: 'Estadísticas extendidas de disco.' },
      { name: 'vmstat (timestamp)', syntax: 'vmstat <b>-t 1</b>', desc: 'Con timestamp.' },
      { name: 'dmesg (level)', syntax: 'dmesg <b>-l err,warn</b>', desc: 'Filtra por nivel.' },
      { name: 'dmesg (decode)', syntax: 'dmesg <b>-x</b>', desc: 'Decodifica facility/level.' },
      { name: 'dmesg (json)', syntax: 'dmesg <b>-J</b>', desc: 'Output JSON.' },
      { name: 'dmesg (follow)', syntax: 'dmesg <b>-w</b>', desc: 'Wait for new messages.' },
      { name: 'journalctl (boot)', syntax: 'journalctl <b>-b</b>', desc: 'Mensajes del boot actual.' },
      { name: 'journalctl (boot-id)', syntax: 'journalctl <b>-b -1</b>', desc: 'Boot anterior.' },
      { name: 'journalctl (list-boots)', syntax: 'journalctl <b>--list-boots</b>', desc: 'Lista boots disponibles.' },
      { name: 'journalctl (disk-usage)', syntax: 'journalctl <b>--disk-usage</b>', desc: 'Uso de disco de journal.' },
      { name: 'journalctl (vacuum-size)', syntax: 'journalctl <b>--vacuum-size=100M</b>', desc: 'Limpia por tamaño.', badge: 'priv' },
      { name: 'journalctl (vacuum-time)', syntax: 'journalctl <b>--vacuum-time=30d</b>', desc: 'Limpia por tiempo.', badge: 'priv' },
      { name: 'journalctl (verify)', syntax: 'journalctl <b>--verify</b>', desc: 'Verifica integridad del journal.' },
      { name: 'journalctl (output-fields)', syntax: 'journalctl <b>-o json --output-fields=MESSAGE,PRIORITY</b>', desc: 'Campos específicos en JSON.' },
      { name: 'journalctl (catalog)', syntax: 'journalctl <b>-x</b>', desc: 'Añade explicaciones del catálogo.' },
      { name: 'journalctl (unit)', syntax: 'journalctl <b>-u nginx.service</b>', desc: 'Por unidad.' },
      { name: 'journalctl (pid)', syntax: 'journalctl <b>_PID=1</b>', desc: 'Por PID.' },
      { name: 'journalctl (uid)', syntax: 'journalctl <b>_UID=0</b>', desc: 'Por UID.' },
      { name: 'logger (priority)', syntax: 'logger <b>-p local0.err</b> "error message"', desc: 'Con prioridad específica.' },
      { name: 'logger (server)', syntax: 'logger <b>-n logserver</b> "message"', desc: 'A servidor remoto.' },
      { name: 'syslog-ng-ctl', syntax: 'syslog-ng-ctl <b>stats</b>', desc: 'Control de syslog-ng' },
      { name: 'rsyslogd (config)', syntax: 'rsyslogd <b>-N1</b>', desc: 'Verifica config.' },
      { name: 'logrotate (debug)', syntax: 'logrotate <b>-d /etc/logrotate.conf</b>', desc: 'Modo debug.' },
      { name: 'logrotate (force)', syntax: 'logrotate <b>-f /etc/logrotate.conf</b>', desc: 'Fuerza rotación.' },
      { name: 'newsyslog', syntax: 'newsyslog <b>-v</b>', desc: 'Rota logs (BSD).' },
    ]
  },

];

// ── BUILD DOM ──────────────────────────────────────────────────────────────
const sidebar      = document.getElementById('sidebar');
const mainContent  = document.getElementById('main-content');
const searchInput  = document.getElementById('search');
const searchResults= document.getElementById('search-results');
const totalCount   = document.getElementById('total-count');
const visibleCount = document.getElementById('visible-count');

let allCommands = [];
let activeCategory = 'all';

function badge(type) {
  if (!type) return '';
  const labels = { danger:'PELIGRO', net:'RED', sec:'SEGURIDAD', priv:'PRIVILEGIO' };
  return `<span class="cmd-badge badge-${type}">${labels[type]||type}</span>`;
}

function buildCard(cmd) {
  const hasInterp = !!cmd.interp;
  return `
    <div class="cmd-card${hasInterp ? ' has-interp' : ''}" data-name="${cmd.name.toLowerCase()}" data-desc="${cmd.desc.toLowerCase()}" data-cat="${cmd.catId}">
      <button class="copy-btn" title="Copiar nombre del comando">copiar</button>
      <div class="cmd-header">
        <span class="cmd-name">${cmd.name}</span>
        ${badge(cmd.badge)}
      </div>
      <div class="cmd-syntax">${cmd.syntax}</div>
      <div class="cmd-desc">${cmd.desc}</div>
      ${hasInterp ? `<div class="cmd-interp">${cmd.interp}</div>` : ''}
      ${hasInterp ? `<div class="interp-hint">← hover para ver cómo leer el output</div>` : ''}
    </div>`;
}

// Build sidebar + sections
CATEGORIES.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'nav-btn';
  btn.dataset.cat = cat.id;
  btn.innerHTML = `<span class="icon">${cat.icon}</span>${cat.name}<span class="nav-count">${cat.commands.length}</span>`;
  btn.onclick = () => showCategory(cat.id);
  sidebar.appendChild(btn);

  const sec = document.createElement('div');
  sec.className = 'cat-section';
  sec.id = 'cat-' + cat.id;

  const cards = cat.commands.map(c => {
    const full = { ...c, catId: cat.id };
    allCommands.push(full);
    return buildCard(full);
  }).join('');

  sec.innerHTML = `
    <div class="section-header">
      <div class="section-title">${cat.icon} ${cat.name}</div>
      <div class="section-subtitle">${cat.commands.length} comandos</div>
    </div>
    <div class="cmd-grid">${cards}</div>`;

  mainContent.appendChild(sec);
});

// "Todos" button
const allBtn = document.createElement('button');
allBtn.className = 'nav-btn active';
allBtn.dataset.cat = 'all';
allBtn.innerHTML = `<span class="icon">📌</span>Todos<span class="nav-count">${allCommands.length}</span>`;
allBtn.onclick = () => showCategory('all');
sidebar.insertBefore(allBtn, sidebar.firstChild);
sidebar.insertBefore(Object.assign(document.createElement('div'), { className: 'nav-label', textContent: 'Categorías' }), sidebar.children[1]);

totalCount.textContent  = allCommands.length;
visibleCount.textContent= allCommands.length;

function showCategory(catId) {
  activeCategory = catId;
  searchInput.value = '';
  searchResults.classList.remove('visible');
  document.querySelectorAll('.cat-section').forEach(s => s.classList.remove('visible'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.nav-btn[data-cat="${catId}"]`).classList.add('active');
  if (catId === 'all') {
    document.querySelectorAll('.cat-section').forEach(s => s.classList.add('visible'));
    visibleCount.textContent = allCommands.length;
  } else {
    document.getElementById('cat-' + catId)?.classList.add('visible');
    visibleCount.textContent = CATEGORIES.find(c => c.id === catId)?.commands.length || 0;
  }
  mainContent.scrollTop = 0;
}

showCategory('all');

// ── SEARCH ──────────────────────────────────────────────────────────────
function doSearch(q) {
  if (!q) { showCategory(activeCategory); return; }
  const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
  document.querySelectorAll('.cat-section').forEach(s => s.classList.remove('visible'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  const matches = allCommands.filter(cmd => {
    const hay = cmd.name.toLowerCase() + ' '
      + cmd.desc.toLowerCase() + ' '
      + cmd.syntax.toLowerCase().replace(/<[^>]+>/g,'')
      + (cmd.interp ? cmd.interp.toLowerCase().replace(/<[^>]+>/g,'') : '');
    return terms.every(t => hay.includes(t));
  });

  if (matches.length === 0) {
    searchResults.innerHTML = `<div class="no-results visible"><div class="nr-icon">∅</div><div class="nr-text">Sin resultados para "${q}"</div><div class="nr-sub">Prueba otro término</div></div>`;
  } else {
    searchResults.innerHTML = `
      <div class="section-header">
        <div class="section-title">🔎 Resultados</div>
        <div class="section-subtitle">${matches.length} comando${matches.length!==1?'s':''} encontrado${matches.length!==1?'s':''}</div>
      </div>
      <div class="cmd-grid">${matches.map(buildCard).join('')}</div>`;
  }
  searchResults.classList.add('visible');
  visibleCount.textContent = matches.length;
}

let searchTimer;
searchInput.addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(e.target.value.trim()), 150);
});

// ── COPY ──────────────────────────────────────────────────────────────
document.addEventListener('click', e => {
  if (!e.target.classList.contains('copy-btn')) return;
  const name = e.target.closest('.cmd-card').querySelector('.cmd-name').textContent;
  navigator.clipboard?.writeText(name).then(() => {
    e.target.textContent = '✓ copiado';
    e.target.classList.add('copied');
    setTimeout(() => { e.target.textContent = 'copiar'; e.target.classList.remove('copied'); }, 1400);
  });
});
</script>
</body>
</html>
